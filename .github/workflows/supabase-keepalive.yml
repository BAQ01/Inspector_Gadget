name: Supabase Keepalive

on:
  workflow_dispatch:
  schedule:
    # Elke dag om 08:00 UTC — voorkomt Supabase free-tier pauzering (grens: 7 dagen inactiviteit)
    - cron: '0 8 * * *'

concurrency:
  group: supabase-keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Validate configuration
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing repository secrets SUPABASE_URL or SUPABASE_ANON_KEY"
            echo ""
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → Secrets tab"
            echo "Add these repository secrets:"
            echo "  SUPABASE_URL       = https://blqpecudiddxwbidtdjk.supabase.co"
            echo "  SUPABASE_ANON_KEY  = (your anon/public key from Supabase dashboard)"
            exit 1
          fi
          echo "Configuration valid"

      - name: Ping Supabase auth
        run: |
          set -euo pipefail
          base_url="${SUPABASE_URL%/}"

          http_code="$(
            curl -sS -o /dev/null -w '%{http_code}' \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              "${base_url}/auth/v1/settings"
          )"

          if [ "${http_code#2}" = "${http_code}" ]; then
            echo "::warning::Auth ping failed (HTTP ${http_code})"
          else
            echo "Auth endpoint OK (HTTP ${http_code})"
          fi

      - name: Query database (real activity)
        run: |
          set -euo pipefail
          base_url="${SUPABASE_URL%/}"

          # SELECT op profiles — telt als database-activiteit bij Supabase
          response=$(curl -sS -w '\n%{http_code}' \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: count=exact" \
            "${base_url}/rest/v1/profiles?select=id&limit=1")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "${http_code#2}" = "${http_code}" ]; then
            echo "::error::Database query failed (HTTP ${http_code}): ${body}"
            exit 1
          fi

          echo "Database query OK (HTTP ${http_code}) — project is active"

      - name: Query inspections (extra activiteit)
        run: |
          set -euo pipefail
          base_url="${SUPABASE_URL%/}"

          # Tweede query op inspections tabel — meer database-activiteit
          response=$(curl -sS -w '\n%{http_code}' \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: count=exact" \
            "${base_url}/rest/v1/inspections?select=id&limit=1")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "${http_code#2}" = "${http_code}" ]; then
            echo "::warning::Inspections query failed (HTTP ${http_code}): ${body}"
          else
            echo "Inspections query OK (HTTP ${http_code})"
          fi

          echo "Keepalive complete — Supabase project blqpecudiddxwbidtdjk blijft actief"
